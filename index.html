<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SocialElite Admin Login</title>

<link rel="stylesheet" href="login.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>


<body>


<div class="login-container">


    <div class="login-card">


        <h1>
            SocialElite
        </h1>


        <p class="subtitle">
            Admin Panel
        </p>



        <form id="loginForm">


            <div class="input-group">

                <label>
                    Email
                </label>

                <input
                type="email"
                id="email"
                placeholder="admin@example.com"
                required>

            </div>




            <div class="input-group">

                <label>
                    Password
                </label>


                <input
                type="password"
                id="password"
                placeholder="Enter password"
                required>


            </div>




            <button
            type="submit"
            id="loginBtn">

                Login

            </button>



            <p
            id="message"
            class="message">

            </p>



        </form>


    </div>


</div>



<script src="login.js"></script>


</body>

    </html>
