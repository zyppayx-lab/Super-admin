<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Inventory</title>

<link
rel="stylesheet"
href="inventory.css">

</head>

<body>

<div class="container">

<header class="page-header">

<div>

<h1>Inventory</h1>

<p>

Add account credentials for this product

</p>

</div>

<a
href="products.html"
class="back-btn">

← Products

</a>

</header>

<div class="card">

<h2 id="productName">

Loading Product...

</h2>

<p id="productInfo">

Please wait...

</p>

</div>

<form
id="inventoryForm">

<div class="card">

<h2>

Account Credentials

</h2>

<div class="form-grid">

<div class="form-group">

<label>

Username / Email

</label>

<input
type="text"
id="username"
required>

</div>

<div class="form-group">

<label>

Password

</label>

<input
type="text"
id="password"
required>

</div>

<div class="form-group">

<label>

Recovery Email

</label>

<input
type="email"
id="recoveryEmail">

</div>

<div class="form-group">

<label>

Recovery Password

</label>

<input
type="text"
id="recoveryPassword">

</div>
<div class="form-group">

<label>

Notes

</label>

<textarea
id="notes"
rows="4"
placeholder="Optional notes..."></textarea>

</div>

<div class="form-group">

<label>

Status

</label>

<select
id="status"
required>

<option value="available">

Available

</option>

<option value="locked">

Locked

</option>

<option value="sold">

Sold

</option>

</select>

</div>

</div>

</div>

<div class="card">

<h2>

Actions

</h2>

<div class="actions">

<button
type="submit"
class="save-btn">

Save Credentials

</button>

<button
type="button"
class="secondary-btn"
onclick="window.location.href='products.html'">

Finish Later

</button>

</div>

</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="inventory.js"></script>

</body>

  </html>
