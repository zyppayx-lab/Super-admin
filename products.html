<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Products</title>

<link
rel="stylesheet"
href="products.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<header class="page-header">

<h1>

Products

</h1>

<p>

Manage marketplace products

</p>

<a
href="create-product.html"
class="create-btn">

+ Create Product

</a>

</header>

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="Search products">

<select id="platformFilter">

<option value="all">

All Platforms

</option>

</select>

<select id="countryFilter">

<option value="all">

All Countries

</option>

</select>

</div>

<div
class="products-grid"
id="productsGrid">

<div class="loading">

Loading products...

</div>

</div>
        <template id="productTemplate">

            <div class="product-card">

                <div class="product-images">

                    <img
                    class="main-image"
                    src=""
                    alt="Product Image">

                    <img
                    class="small-image"
                    src=""
                    alt="Product Thumbnail">

                </div>

                <div class="product-content">

                    <h3 class="product-name">

                        Product Name

                    </h3>

                    <p class="product-description">

                        Description

                    </p>

                    <div class="product-details">

                        <span>

                            <strong>Platform:</strong>

                            <span class="platform">

                                -

                            </span>

                        </span>

                        <span>

                            <strong>Country:</strong>

                            <span class="country">

                                -

                            </span>

                        </span>

                        <span>

                            <strong>Category:</strong>

                            <span class="category">

                                -

                            </span>

                        </span>

                        <span>

                            <strong>Stock:</strong>

                            <span class="stock">

                                0

                            </span>

                        </span>

                        <span>

                            <strong>Status:</strong>

                            <span class="status">

                                Active

                            </span>

                        </span>

                    </div>

                    <div class="product-price">

                        ₦0

                    </div>

                    <div class="product-actions">

                        <button
                        class="edit-btn">

                            Edit

                        </button>

                        <button
                        class="delete-btn">

                            Delete

                        </button>

                    </div>

                </div>

            </div>

        </template>

    </div>

    <script src="products.js"></script>

</body>

                            </html>
