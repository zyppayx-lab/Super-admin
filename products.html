<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Products | SocialElite Admin</title>

<link rel="stylesheet"
href="products.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<header class="topbar">

<h1>Product Management</h1>

<div>

<button id="refreshBtn">
Refresh
</button>

<button id="addProductBtn">
+ Add Product
</button>

</div>

</header>



<div class="toolbar">

<input
type="search"
id="searchInput"
placeholder="Search products...">


<select id="categoryFilter">

<option value="">
All Categories
</option>

</select>

</div>



<div id="messageBox"></div>



<table class="products-table">

<thead>

<tr>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Type</th>

<th>Stock</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="productsBody">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>





<!-- Add/Edit Modal -->

<div
id="productModal"
class="modal hidden">

<div class="modal-content">

<h2 id="modalTitle">

Add Product

</h2>



<form id="productForm">

<select
id="category"
required>

<option value="">
Select Category
</option>

</select>



<input
type="text"
id="name"
placeholder="Product Name"
required>



<textarea
id="description"
placeholder="Description">
</textarea>



<input
type="number"
id="price"
placeholder="Price"
required>



<select
id="type"
required>

<option value="">
Type
</option>

<option value="aged">
Aged
</option>

<option value="new">
New
</option>

</select>



<select
id="stockType"
required>

<option value="">
Stock Type
</option>

<option value="manual">
Manual
</option>

<option value="automatic">
Automatic
</option>

</select>



<div class="modal-buttons">

<button
type="submit">

Save Product

</button>

<button
type="button"
id="cancelBtn">

Cancel

</button>

</div>

</form>

</div>

</div>



<script src="admin-auth.js"></script>

<script src="products.js"></script>

</body>

</html>
