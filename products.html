<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | SocialElite Admin</title>

<link rel="stylesheet" href="products.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h2>SocialElite</h2>

        <a href="dashboard.html">Dashboard</a>

        <a class="active" href="products.html">Products</a>

        <a href="inventory.html">Inventory</a>

        <a href="orders.html">Orders</a>

        <a href="users.html">Users</a>

        <a href="wallets.html">Wallets</a>

        <button id="logoutBtn">
            Logout
        </button>

    </aside>



    <main class="content">

        <div class="top-bar">

            <h1>Products</h1>

            <button id="addProductBtn">
                + Add Product
            </button>

        </div>



        <input
        id="searchInput"
        type="search"
        placeholder="Search products...">



        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Platform</th>

                        <th>Category</th>

                        <th>Country</th>

                        <th>Price</th>

                        <th>Stock</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="productsTable">

                </tbody>

            </table>

        </div>

    </main>

</div>



<div
id="productModal"
class="modal">

<div class="modal-content">

<h2>Add Product</h2>

<form id="productForm">

<select id="category"></select>

<input
id="name"
type="text"
placeholder="Product Name"
required>

<textarea
id="description"
placeholder="Description"></textarea>

<input
id="price"
type="number"
placeholder="Price"
required>

<input
id="type"
type="text"
placeholder="Type"
required>

<input
id="stockType"
type="text"
placeholder="Stock Type"
required>

<div class="buttons">

<button type="submit">

Save Product

</button>

<button
type="button"
id="closeModal">

Cancel

</button>

</div>

</form>

</div>

</div>



<script src="admin-auth.js"></script>

<script src="products.js"></script>

</body>

  </html>
